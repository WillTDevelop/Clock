<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
        }

        #clock {
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: bold;
            background: #1e1e1e;
            padding: 18px 36px;
            border-radius: 6px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .menu-wrapper {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(calc(100% - 40px));
            width: 100%;
            max-width: 1000px;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 15px 20px 25px 20px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.05);
            border-radius: 12px 12px 0 0;
            border: 1px solid #f0f0f0;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-wrapper:hover {
            transform: translateX(-50%) translateY(0);
        }

        .menu-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #a0a0a0;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
        }

        .menu-title::after {
            content: ' ▲';
            font-size: 0.6rem;
            display: inline-block;
            transition: transform 0.4s;
        }

        .menu-wrapper:hover .menu-title::after {
            transform: rotate(180deg);
        }

        .timezone-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
            max-height: 30vh;
            overflow-y: auto;
            padding: 2px;
        }

        .zone-btn {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            color: #333333;
            padding: 10px 6px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .zone-btn:hover {
            background-color: #f5f5f5;
            border-color: #adadad;
        }

        .zone-btn.active {
            background-color: #1e1e1e;
            color: #ffffff;
            border-color: #1e1e1e;
        }

        @media (max-width: 480px) {
            .timezone-menu {
                grid-template-columns: repeat(3, 1fr);
            }
            .menu-wrapper {
                transform: translateX(-50%) translateY(calc(100% - 35px));
                padding: 10px 10px 20px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="clock">00:00:00 UTC</div>
    </div>

    <div class="menu-wrapper">
        <div class="menu-title">Select Timezone</div>
        <div class="timezone-menu" id="menu"></div>
    </div>

    <script>
        const locations = [
            { name: "Honolulu", zone: "Pacific/Honolulu" },
            { name: "Los Angeles", zone: "America/Los_Angeles" },
            { name: "Denver", zone: "America/Denver" },
            { name: "Chicago", zone: "America/Chicago" },
            { name: "New York", zone: "America/New_York" },
            { name: "London", zone: "Europe/London" },
            { name: "UTC", zone: "UTC" },
            { name: "Paris", zone: "Europe/Paris" },
            { name: "Cairo", zone: "Africa/Cairo" },
            { name: "Dubai", zone: "Asia/Dubai" },
            { name: "Mumbai", zone: "Asia/Kolkata" },
            { name: "Bangkok", zone: "Asia/Bangkok" },
            { name: "Singapore", zone: "Asia/Singapore" },
            { name: "Beijing", zone: "Asia/Shanghai" },
            { name: "Taipei", zone: "Asia/Taipei" },
            { name: "Seoul", zone: "Asia/Seoul" },
            { name: "Tokyo", zone: "Asia/Tokyo" },
            { name: "Sydney", zone: "Australia/Sydney" },
            { name: "Auckland", zone: "Pacific/Auckland" }
        ];

        let currentZone = "UTC";
        let currentLabel = "UTC";
        const clockEl = document.getElementById("clock");
        const menuEl = document.getElementById("menu");

        locations.forEach(loc => {
            const btn = document.createElement("button");
            btn.classList.add("zone-btn");
            if (loc.zone === currentZone) btn.classList.add("active");
            btn.innerText = loc.name;
            
            btn.addEventListener("click", () => {
                document.querySelectorAll(".zone-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                
                currentZone = loc.zone;
                currentLabel = loc.name;
                updateClock();
            });
            
            menuEl.appendChild(btn);
        });

        function updateClock() {
            const now = new Date();
            
            try {
                const timeString = now.toLocaleTimeString("en-US", {
                    timeZone: currentZone,
                    hour12: false,
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit"
                });
                
                clockEl.innerText = `${timeString} ${currentLabel}`;
            } catch (e) {
                clockEl.innerText = now.toUTCString().substring(17, 25) + " UTC";
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
